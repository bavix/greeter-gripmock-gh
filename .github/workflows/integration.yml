name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  greeter:
    name: greeter-${{ matrix.case.format }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        case:
          - format: proto
            source: api/greeter.proto
          - format: pb
            source: api/greeter.pb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install grpctestify fast
        shell: bash
        run: cargo binstall grpctestify --no-confirm

      - name: Check version
        shell: bash
        run: grpctestify --version

      - name: Start GripMock
        id: gripmock
        uses: bavix/gripmock-action@v1
        with:
          source: ${{ matrix.case.source }}
          stub: stubs
          wait: true

      - name: Check stub response with grpctestify
        shell: bash
        run: |
          grpctestify tests/
